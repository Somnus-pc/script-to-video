services:
  - type: web
    name: script-to-video-api
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.9.0
      - key: MOONSHOT_API_KEY
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: KLING_API_KEY
        sync: false
    healthCheckPath: /
    autoDeploy: true
